<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>FireWatch — NFPA Compliance Tracking</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#0d0f12;--bg2:#13161b;--bg3:#1a1e26;--border:#2a2f3a;
      --orange:#e85d04;--orange2:#f48c06;--red:#c1121f;--teal:#0d9488;
      --green:#15803d;--blue:#1d4ed8;--purple:#7c3aed;
      --text:#e8eaf0;--muted:#6b7280;--muted2:#9ca3af;--white:#ffffff;
      --pad-mobile:1rem;--pad-desk:1.5rem;--topbar-h:52px;--tab-h:44px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

    /* LOGIN */
    #loginPage{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;}
    .brand-side{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:3rem 3.5rem;position:relative;overflow:hidden;}
    .brand-side::before{content:'';position:absolute;top:-40px;right:-40px;width:260px;height:260px;border:2px solid rgba(232,93,4,0.12);border-radius:50%;}
    .brand-side::after{content:'';position:absolute;bottom:60px;right:40px;width:120px;height:120px;border:1px solid rgba(232,93,4,0.08);border-radius:50%;}
    .brand-icon{font-size:2.8rem;margin-bottom:0.5rem;filter:drop-shadow(0 0 20px rgba(232,93,4,0.5));}
    .brand-name{font-family:'Bebas Neue',sans-serif;font-size:5rem;letter-spacing:0.08em;color:var(--orange);line-height:1;text-shadow:0 0 40px rgba(232,93,4,0.3);}
    .brand-sub{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;letter-spacing:0.25em;color:var(--muted2);margin-top:0.6rem;text-transform:uppercase;}
    .brand-divider{width:48px;height:2px;background:var(--orange);margin:2rem 0;}
    .brand-features{list-style:none;display:flex;flex-direction:column;gap:0.75rem;}
    .brand-features li{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:var(--muted2);letter-spacing:0.05em;display:flex;align-items:center;gap:0.6rem;}
    .brand-features li::before{content:'▸';color:var(--orange);font-size:0.65rem;}
    .login-side{background:var(--bg);display:flex;align-items:center;justify-content:center;padding:2rem;}
    .login-card{width:min(380px,100%);}
    .login-card h2{font-family:'IBM Plex Mono',monospace;font-size:0.8rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted2);margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
    .field{margin-bottom:1.25rem;}
    .field label{display:block;font-size:0.75rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:0.5rem;}
    .field input{width:100%;padding:0.75rem 1rem;background:var(--bg2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:16px;transition:border-color 0.2s;}
    .field input:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,93,4,0.1);}
    .btn-login{width:100%;padding:0.85rem;background:var(--orange);border:none;border-radius:4px;color:white;font-family:'IBM Plex Mono',monospace;font-size:0.85rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;margin-top:0.5rem;transition:background 0.2s,transform 0.1s;min-height:48px;}
    .btn-login:hover{background:var(--orange2);}
    .btn-login:active{transform:scale(0.99);background:var(--orange2);}
    #loginMsg{margin-top:0.85rem;font-size:0.8rem;font-family:'IBM Plex Mono',monospace;min-height:1.2rem;color:var(--muted2);}

    /* DASHBOARD */
    .hidden{display:none!important;}
    #appPage{min-height:100vh;display:flex;flex-direction:column;}
    .topbar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.5rem;padding:0 var(--pad-desk);height:var(--topbar-h);position:sticky;top:0;z-index:100;}
    .topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:0.1em;color:var(--orange);margin-right:auto;white-space:nowrap;}
    .topbar-user{font-family:'IBM Plex Mono',monospace;font-size:0.78rem;color:var(--muted2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
    .topbar-user strong{color:var(--text);font-weight:600;}
    .topbar-user-text{display:inline;}
    .role-pill{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:3px 10px;border-radius:3px;border:1px solid currentColor;white-space:nowrap;}
    .btn-bar{padding:5px 14px;border:1px solid var(--border);border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:0.72rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:background 0.15s;white-space:nowrap;min-height:36px;}
    .btn-refresh{background:transparent;color:var(--muted2);}
    .btn-refresh:hover{background:var(--bg3);color:var(--text);}
    .btn-logout{background:transparent;color:var(--red);border-color:var(--red);}
    .btn-logout:hover{background:rgba(193,18,31,0.1);}
    .stats-row{display:flex;gap:1px;background:var(--border);border-bottom:1px solid var(--border);flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;}
    .stats-row::-webkit-scrollbar{display:none;}
    .stat-box{flex:1;min-width:90px;background:var(--bg2);padding:0.85rem 1rem;border-top:3px solid transparent;transition:border-color 0.2s;}
    .stat-box.color-orange{border-top-color:var(--orange);}
    .stat-box.color-teal{border-top-color:var(--teal);}
    .stat-box.color-blue{border-top-color:var(--blue);}
    .stat-box.color-purple{border-top-color:var(--purple);}
    .stat-label{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-bottom:0.3rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .stat-val{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:0.04em;color:var(--text);line-height:1;}
    .tab-bar{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 var(--pad-desk);overflow-x:auto;scrollbar-width:none;position:sticky;top:var(--topbar-h);z-index:99;}
    .tab-bar::-webkit-scrollbar{display:none;}
    .tab-btn{padding:0 1.25rem;height:var(--tab-h);background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:0.75rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:color 0.15s,border-color 0.15s;white-space:nowrap;flex-shrink:0;}
    .tab-btn:hover{color:var(--text);}
    .tab-btn.active{color:var(--orange);border-bottom-color:var(--orange);}
    .tab-panels{flex:1;padding:var(--pad-desk);}
    .panel{display:none;}
    .panel.active{display:block;}
    .table-toolbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
    .btn-crud{padding:8px 14px;border:1px solid transparent;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:0.72rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:opacity 0.15s;min-height:40px;}
    .btn-crud:hover{opacity:0.85;}
    .btn-add{background:var(--green);color:white;border-color:var(--green);}
    .btn-edit{background:var(--blue);color:white;border-color:var(--blue);}
    .btn-delete{background:var(--red);color:white;border-color:var(--red);}
    .table-scroll-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:4px;}
    .data-table{width:100%;min-width:480px;border-collapse:collapse;background:var(--bg2);font-size:0.82rem;}
    .data-table thead th{background:var(--bg3);color:var(--muted2);font-family:'IBM Plex Mono',monospace;font-size:0.68rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;padding:0.65rem 1rem;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
    .data-table tbody td{padding:0.65rem 1rem;border-bottom:1px solid var(--border);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:0.78rem;}
    .data-table tbody tr:last-child td{border-bottom:none;}
    .data-table tbody tr:hover td{background:var(--bg3);cursor:pointer;}
    .data-table tbody tr.selected td{background:rgba(232,93,4,0.08);}
    .card-list{display:none;}
    .data-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:0.9rem 1rem;margin-bottom:0.6rem;cursor:pointer;transition:border-color 0.15s,background 0.15s;position:relative;}
    .data-card:active{background:var(--bg3);}
    .data-card.selected{border-color:var(--orange);background:rgba(232,93,4,0.06);}
    .data-card-primary{font-family:'IBM Plex Sans',sans-serif;font-size:0.9rem;font-weight:600;color:var(--text);margin-bottom:0.4rem;padding-right:2rem;}
    .data-card-secondary{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:var(--muted2);line-height:1.6;}
    .data-card-badge{position:absolute;top:0.9rem;right:0.9rem;}
    .data-card-id{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:var(--muted);margin-bottom:0.3rem;}
    .badge{display:inline-block;padding:2px 8px;border-radius:2px;font-size:0.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;}
    .badge-pending{background:rgba(232,93,4,0.15);color:var(--orange);border:1px solid rgba(232,93,4,0.3);}
    .badge-complete{background:rgba(13,148,136,0.15);color:var(--teal);border:1px solid rgba(13,148,136,0.3);}
    .badge-default{background:rgba(107,114,128,0.15);color:var(--muted2);border:1px solid var(--border);}
    .empty-msg{text-align:center;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:0.8rem;padding:3rem;letter-spacing:0.05em;}

    /* MODALS */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(2px);padding:0;}
    .modal-box{background:var(--bg2);border:1px solid var(--border);border-top:2px solid var(--orange);border-radius:12px 12px 0 0;padding:1.75rem var(--pad-mobile);width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 -12px 40px rgba(0,0,0,0.6);animation:slideUp 0.25s ease-out;}
    @keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
    .modal-box::before{content:'';display:block;width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 1.25rem;}
    .modal-box h3{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:0.08em;color:var(--orange);margin-bottom:1.25rem;}
    .form-row{margin-bottom:1rem;}
    .form-row label{display:block;font-family:'IBM Plex Mono',monospace;font-size:0.68rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted2);margin-bottom:0.4rem;}
    .form-row input,.form-row select,.form-row textarea{width:100%;padding:0.7rem 0.85rem;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:16px;transition:border-color 0.15s;}
    .form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--orange);}
    .form-row textarea{resize:vertical;}
    .modal-actions{display:flex;gap:8px;justify-content:stretch;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border);}
    .btn-save{flex:1;padding:12px 20px;background:var(--orange);border:none;border-radius:3px;color:white;font-family:'IBM Plex Mono',monospace;font-size:0.85rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;min-height:48px;}
    .btn-save:hover{background:var(--orange2);}
    .btn-cancel{flex:1;padding:12px 20px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--muted2);font-family:'IBM Plex Mono',monospace;font-size:0.85rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;min-height:48px;}
    .btn-cancel:hover{border-color:var(--muted2);color:var(--text);}
    .modal-error{color:var(--red);font-family:'IBM Plex Mono',monospace;font-size:0.75rem;margin-top:0.5rem;min-height:1rem;}

    /* RESPONSIVE */
    @media(min-width:768px){
      .modal-overlay{align-items:center;padding:1rem;}
      .modal-box{border-radius:4px;width:min(480px,94vw);max-height:85vh;animation:fadeIn 0.2s ease-out;}
      .modal-box::before{display:none;}
      @keyframes fadeIn{from{opacity:0;transform:scale(0.97);}to{opacity:1;transform:scale(1);}}
      .modal-actions{justify-content:flex-end;}
      .btn-save,.btn-cancel{flex:none;padding:7px 20px;min-height:auto;font-size:0.75rem;}
    }
    @media(max-width:767px){
      #loginPage{grid-template-columns:1fr;}
      .brand-side{padding:1.75rem var(--pad-mobile);min-height:auto;border-right:none;border-bottom:1px solid var(--border);}
      .brand-name{font-size:3.5rem;}
      .brand-features{display:none;}
      .brand-divider{margin:1rem 0;}
      .topbar{padding:0 var(--pad-mobile);gap:0.4rem;}
      .topbar-logo{font-size:1.3rem;}
      .topbar-user-text{display:none;}
      .role-pill{font-size:0.62rem;padding:2px 7px;}
      .btn-bar{padding:5px 10px;font-size:0.68rem;letter-spacing:0;}
      .stats-row{flex-wrap:wrap;}
      .stat-box{min-width:calc(50% - 1px);padding:0.65rem 0.85rem;}
      .stat-val{font-size:1.6rem;}
      .stat-label{font-size:0.55rem;}
      .tab-bar{padding:0 0.5rem;}
      .tab-btn{padding:0 0.85rem;font-size:0.68rem;}
      .tab-panels{padding:0.85rem var(--pad-mobile);}
      .table-toolbar{gap:6px;}
      .btn-crud{flex:1;text-align:center;padding:10px 8px;font-size:0.68rem;}
      .table-scroll-wrap{display:none;}
      .card-list{display:block;}
    }
    @media(max-width:399px){
      .brand-name{font-size:2.8rem;}
      .stat-box{min-width:100%;}
      .stats-row{flex-direction:column;gap:1px;}
    }
    @media(min-width:1024px){
      .stat-val{font-size:2.4rem;}
      .stat-box{padding:1rem 1.5rem;}
      .stat-label{font-size:0.65rem;}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <section class="brand-side">
    <div class="brand-icon">🔥</div>
    <div class="brand-name">FireWatch</div>
    <div class="brand-sub">NFPA Compliance Tracking System</div>
    <div class="brand-divider"></div>
    <ul class="brand-features">
      <li>LIVE SQLITE DATABASE CONNECTION</li>
      <li>LOCAL-FIRST · OFFLINE CAPABLE</li>
      <li>ROLE-BASED ACCESS CONTROL</li>
    </ul>
  </section>
  <section class="login-side">
    <div class="login-card">
      <h2>System Login</h2>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="username" placeholder="Enter username" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="Enter password" />
      </div>
      <button class="btn-login" id="loginBtn">Login</button>
      <p id="loginMsg"></p>
    </div>
  </section>
</div>

<!-- DASHBOARD -->
<div id="appPage" class="hidden">
  <div class="topbar">
    <span class="topbar-logo">🔥 FireWatch</span>
    <span class="topbar-user"><span class="topbar-user-text"><strong id="welcomeLabel"></strong></span></span>
    <span class="role-pill" id="roleLabel"></span>
    <button class="btn-bar btn-refresh" id="btnRefresh" title="Refresh">↻</button>
    <button class="btn-bar btn-logout" id="btnLogout">Logout</button>
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-box color-orange" id="statBoxExt"><div class="stat-label" id="statLabelExt">Extinguishers</div><div class="stat-val" id="statExt">—</div></div>
    <div class="stat-box color-teal" id="statBoxAssign"><div class="stat-label" id="statLabelAssign">Assignments</div><div class="stat-val" id="statAssign">—</div></div>
    <div class="stat-box color-blue" id="statBoxReports"><div class="stat-label" id="statLabelReports">Reports</div><div class="stat-val" id="statReports">—</div></div>
    <div class="stat-box color-purple" id="statBoxUsers"><div class="stat-label" id="statLabelUsers">Users</div><div class="stat-val" id="statUsers">—</div></div>
  </div>

  <div class="tab-bar" id="tabBar"></div>

  <div class="tab-panels">
    <!-- Extinguishers -->
    <div class="panel" id="panelExtinguishers">
      <div class="table-toolbar hidden" id="extToolbar">
        <button class="btn-crud btn-add" id="btnAdd">＋ Add</button>
        <button class="btn-crud btn-edit" id="btnEdit">✎ Edit</button>
        <button class="btn-crud btn-delete" id="btnDelete">✕ Delete</button>
      </div>
      <div class="table-scroll-wrap" id="tableExtWrap"></div>
      <div class="card-list" id="cardExtWrap"></div>
    </div>

    <!-- Assignments -->
    <div class="panel" id="panelAssignments">
      <div class="table-toolbar hidden" id="assignToolbar">
        <button class="btn-crud btn-add" id="btnGenerateAssign">＋ Generate Assignment</button>
        <button class="btn-crud btn-edit" id="btnEditAssign">✎ Edit Selected</button>
      </div>
      <div class="table-scroll-wrap" id="tableAssignWrap"></div>
      <div class="card-list" id="cardAssignWrap"></div>
    </div>

    <!-- Reports -->
    <div class="panel" id="panelReports">
      <div class="table-toolbar hidden" id="reportToolbar">
        <button class="btn-crud btn-edit" id="btnSubmitReport">＋ Submit Report</button>
      </div>
      <div class="table-scroll-wrap" id="tableReportsWrap"></div>
      <div class="card-list" id="cardReportsWrap"></div>
    </div>

    <!-- Users -->
    <div class="panel" id="panelUsers">
      <div class="table-toolbar hidden" id="userToolbar">
        <button class="btn-crud btn-add" id="btnAddUser">＋ Add User</button>
      </div>
      <div class="table-scroll-wrap" id="tableUsersWrap"></div>
      <div class="card-list" id="cardUsersWrap"></div>
    </div>
  </div>
</div>

<!-- ADD/EDIT EXTINGUISHER MODAL -->
<div class="modal-overlay hidden" id="extModal">
  <div class="modal-box">
    <h3 id="modalTitle">Add Extinguisher</h3>
    <div class="form-row"><label>Address *</label><input type="text" id="fAddress" placeholder="e.g. 123 University Avenue" /></div>
    <div class="form-row"><label>Building</label><input type="text" id="fBuilding" placeholder="e.g. Bldg A" /></div>
    <div class="form-row"><label>Floor</label><input type="number" id="fFloor" value="1" min="0" /></div>
    <div class="form-row"><label>Room</label><input type="text" id="fRoom" placeholder="e.g. 101" /></div>
    <div class="form-row"><label>Location Description</label><input type="text" id="fLocDesc" placeholder="e.g. Near the elevator" /></div>
    <div class="form-row"><label>Inspection Interval (days)</label><input type="number" id="fInterval" value="30" min="1" /></div>
    <div class="form-row"><label>Next Due Date</label><input type="date" id="fDueDate" /></div>
    <div class="modal-error" id="modalError"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modalCancel">Cancel</button>
      <button class="btn-save" id="modalSave">Save</button>
    </div>
  </div>
</div>

<!-- GENERATE / EDIT ASSIGNMENT MODAL (Admin / ThirdPAdmin) -->
<div class="modal-overlay hidden" id="assignModal">
  <div class="modal-box">
    <h3 id="assignModalTitle">Generate Assignment</h3>
    <div class="form-row"><label>Extinguisher *</label><select id="aExtinguisher"></select></div>
    <div class="form-row"><label>Inspector *</label><select id="aInspector"></select></div>
    <div class="form-row"><label>Due Date</label><input type="date" id="aDueDate" /></div>
    <div class="form-row"><label>Notes</label><textarea id="aNotes" rows="3" placeholder="Optional notes for the inspector..."></textarea></div>
    <div class="form-row" id="aStatusRow" style="display:none"><label>Status</label>
      <select id="aStatus">
        <option value="Pending Inspection">Pending Inspection</option>
        <option value="Inspection Complete">Inspection Complete</option>
      </select>
    </div>
    <div class="modal-error" id="assignModalError"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="assignModalCancel">Cancel</button>
      <button class="btn-save" id="assignModalSave">Generate</button>
    </div>
  </div>
</div>

<!-- SUBMIT REPORT MODAL (Inspector / ThirdPInv) -->
<div class="modal-overlay hidden" id="reportModal">
  <div class="modal-box">
    <h3>Submit Inspection Report</h3>
    <div class="form-row"><label>Assignment *</label><select id="rAssignment"></select></div>
    <div class="form-row"><label>Inspection Date</label><input type="date" id="rDate" /></div>
    <div class="form-row"><label>Notes</label><textarea id="rNotes" rows="4" placeholder="Enter inspection notes, observations, or findings..."></textarea></div>
    <div class="modal-error" id="reportModalError"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="reportModalCancel">Cancel</button>
      <button class="btn-save" id="reportModalSave">Submit Report</button>
    </div>
  </div>
</div>

<!-- ADD USER MODAL (Admin only) -->
<div class="modal-overlay hidden" id="userModal">
  <div class="modal-box">
    <h3>Add New User</h3>
    <div class="form-row"><label>Username *</label><input type="text" id="uUsername" placeholder="e.g. JSmith" /></div>
    <div class="form-row"><label>Password *</label><input type="password" id="uPassword" placeholder="Enter password" /></div>
    <div class="form-row"><label>Confirm Password *</label><input type="password" id="uConfirm" placeholder="Re-enter password" /></div>
    <div class="form-row">
      <label>Role *</label>
      <select id="uRole">
        <option value="Inspector">Inspector</option>
        <option value="Admin">Admin</option>
        <option value="3rd_Party_Admin">3rd Party Admin</option>
        <option value="3rd_Party_Inspector">3rd Party Inspector</option>
      </select>
    </div>
    <div class="modal-error" id="userModalError"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="userModalCancel">Cancel</button>
      <button class="btn-save" id="userModalSave">Create User</button>
    </div>
  </div>
</div>

<script>
// ── SHA-256 helper (matches server hashlib.sha256) ────────────────────────────
async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

// ── State ──────────────────────────────────────────────────────────────────────
let currentUser   = null;
let selectedExtId = null;
let editingExtId  = null;
let selectedAssignId = null;
let editingAssignId  = null;

// ── Role helpers ───────────────────────────────────────────────────────────────
const isAdmin      = () => currentUser?.role === "Admin";
const isInv        = () => currentUser?.role === "Inspector";
const isThirdAdmin = () => currentUser?.role === "3rd_Party_Admin";
const isThirdInv   = () => currentUser?.role === "3rd_Party_Inspector";

// ── Login ──────────────────────────────────────────────────────────────────────
document.getElementById("loginBtn").addEventListener("click", doLogin);
document.getElementById("password").addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });
document.getElementById("username").addEventListener("keydown", e => { if(e.key==="Enter") document.getElementById("password").focus(); });

async function doLogin() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const msg = document.getElementById("loginMsg");
  if (!username || !password) { msg.style.color="#e85d04"; msg.textContent="Please enter both fields."; return; }
  msg.style.color="#6b7280"; msg.textContent="Authenticating...";
  try {
    const hashed = await sha256(password);
    const res  = await fetch("/api/login", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({username, password: hashed}) });
    const data = await res.json();
    if (data.success) { currentUser={user_id:data.user_id,username:data.username,role:data.role}; showDashboard(); }
    else { msg.style.color="#c1121f"; msg.textContent="Invalid username or password."; }
  } catch { msg.style.color="#c1121f"; msg.textContent="Cannot reach server."; }
}

// ── Dashboard setup ───────────────────────────────────────────────────────────
function showDashboard() {
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("appPage").classList.remove("hidden");
  document.getElementById("welcomeLabel").textContent = currentUser.username + " · " + currentUser.role.toUpperCase();
  const rl = document.getElementById("roleLabel");
  rl.textContent = currentUser.role.replace(/_/g," ");
  const roleColors = {
    "Admin":               {color:"#e85d04",border:"rgba(232,93,4,0.4)"},
    "Inspector":           {color:"#0d9488",border:"rgba(13,148,136,0.4)"},
    "3rd_Party_Admin":     {color:"#1d4ed8",border:"rgba(29,78,216,0.4)"},
    "3rd_Party_Inspector": {color:"#7c3aed",border:"rgba(124,58,237,0.4)"}
  };
  const rc = roleColors[currentUser.role] || {color:"#9ca3af",border:"rgba(156,163,175,0.4)"};
  rl.style.color=rc.color; rl.style.borderColor=rc.border;
  buildTabs(); loadStats(); loadAllData();
}

// ── Build tabs by role ────────────────────────────────────────────────────────
function buildTabs() {
  const tabBar = document.getElementById("tabBar");
  tabBar.innerHTML = "";
  ["panelExtinguishers","panelAssignments","panelReports","panelUsers"].forEach(id => document.getElementById(id).classList.remove("active"));
  ["statBoxExt","statBoxAssign","statBoxReports","statBoxUsers"].forEach(id => document.getElementById(id).style.display="");
  // Hide all toolbars first
  ["extToolbar","assignToolbar","reportToolbar","userToolbar"].forEach(id => document.getElementById(id).classList.add("hidden"));

  let tabs = [];
  if (isAdmin()) {
    tabs = [{id:"panelExtinguishers",label:"Extinguishers"},{id:"panelAssignments",label:"Assignments"},{id:"panelReports",label:"Reports"},{id:"panelUsers",label:"All Users"}];
    document.getElementById("extToolbar").classList.remove("hidden");
    document.getElementById("assignToolbar").classList.remove("hidden");
    document.getElementById("userToolbar").classList.remove("hidden");
  } else if (isInv()) {
    tabs = [{id:"panelAssignments",label:"My Assignments"},{id:"panelReports",label:"My Reports"}];
    document.getElementById("statBoxExt").style.display="none";
    document.getElementById("statBoxUsers").style.display="none";
    document.getElementById("statLabelAssign").textContent="My Assignments";
    document.getElementById("statLabelReports").textContent="My Reports";
    document.getElementById("reportToolbar").classList.remove("hidden");
  } else if (isThirdAdmin()) {
    tabs = [{id:"panelAssignments",label:"Assignments"},{id:"panelUsers",label:"My Team"}];
    document.getElementById("statBoxExt").style.display="none";
    document.getElementById("statBoxReports").style.display="none";
    document.getElementById("statLabelUsers").textContent="Team Members";
    document.getElementById("assignToolbar").classList.remove("hidden");
  } else if (isThirdInv()) {
    tabs = [{id:"panelAssignments",label:"My Assignments"}];
    ["statBoxExt","statBoxReports","statBoxUsers"].forEach(id => document.getElementById(id).style.display="none");
    document.getElementById("statLabelAssign").textContent="My Assignments";
    document.getElementById("reportToolbar").classList.remove("hidden");
  }

  tabs.forEach((t,i) => {
    const btn = document.createElement("button");
    btn.className = "tab-btn"+(i===0?" active":"");
    btn.textContent = t.label;
    btn.addEventListener("click", () => switchTab(t.id,btn,tabBar));
    tabBar.appendChild(btn);
    if (i===0) document.getElementById(t.id).classList.add("active");
  });
}

function switchTab(panelId, clickedBtn, tabBar) {
  tabBar.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  clickedBtn.classList.add("active");
  ["panelExtinguishers","panelAssignments","panelReports","panelUsers"].forEach(id => document.getElementById(id).classList.remove("active"));
  document.getElementById(panelId).classList.add("active");
}

// ── Stats ─────────────────────────────────────────────────────────────────────
async function loadStats() {
  try {
    const data = await fetch("/api/stats").then(r=>r.json());
    if (isAdmin()) {
      document.getElementById("statExt").textContent=data.extinguishers;
      document.getElementById("statAssign").textContent=data.assignments;
      document.getElementById("statReports").textContent=data.reports;
      document.getElementById("statUsers").textContent=data.users;
    } else if (isInv()) {
      const [a,r] = await Promise.all([
        fetch("/api/assignments?user_id="+currentUser.user_id).then(r=>r.json()),
        fetch("/api/reports?user_id="+currentUser.user_id).then(r=>r.json())
      ]);
      document.getElementById("statAssign").textContent=a.length;
      document.getElementById("statReports").textContent=r.length;
    } else if (isThirdAdmin()) {
      document.getElementById("statAssign").textContent=data.assignments;
      const users=await fetch("/api/users").then(r=>r.json());
      document.getElementById("statUsers").textContent=users.filter(u=>u.role==="3rd_Party_Inspector").length;
    } else if (isThirdInv()) {
      const a=await fetch("/api/assignments?user_id="+currentUser.user_id).then(r=>r.json());
      document.getElementById("statAssign").textContent=a.length;
    }
  } catch(e) { console.error("Stats error",e); }
}

// ── Load data ─────────────────────────────────────────────────────────────────
function loadAllData() {
  if (isAdmin())           { loadExtinguishers(); loadAssignments(); loadReports(); loadUsers(); }
  else if (isInv())        { loadAssignments(); loadReports(); }
  else if (isThirdAdmin()) { loadAssignments(); loadUsers(); }
  else if (isThirdInv())   { loadAssignments(); }
}

async function loadExtinguishers() {
  const rows = await fetch("/api/extinguishers").then(r=>r.json());
  const cols = ["extinguisher_id","address","building_number","floor_number","room_number","location_description","inspection_interval_days","next_due_date"];
  renderTable("tableExtWrap",cols,rows,row=>{ selectedExtId=row.extinguisher_id; });
  renderCards("cardExtWrap",rows,"extinguisher",row=>{ selectedExtId=row.extinguisher_id; });
}

async function loadAssignments() {
  let url="/api/assignments";
  if (isInv()||isThirdInv()) url+="?user_id="+currentUser.user_id;
  const rows=await fetch(url).then(r=>r.json());
  const cols=(isAdmin()||isThirdAdmin())?["assignment_id","assigned_by","inspector","extinguisher_id","due_date","status"]:["assignment_id","assigned_by","extinguisher_id","due_date","status"];
  renderTable("tableAssignWrap",cols,rows,row=>{ selectedAssignId=row.assignment_id; window._lastAssignRows=rows; });
  renderCards("cardAssignWrap",rows,"assignment",row=>{ selectedAssignId=row.assignment_id; window._lastAssignRows=rows; });
}

async function loadReports() {
  let url="/api/reports";
  if (isInv()) url+="?user_id="+currentUser.user_id;
  const rows=await fetch(url).then(r=>r.json());
  const cols=isAdmin()?["report_id","extinguisher_id","inspector","inspection_date","notes"]:["report_id","extinguisher_id","inspection_date","notes"];
  renderTable("tableReportsWrap",cols,rows);
  renderCards("cardReportsWrap",rows,"report");
}

async function loadUsers() {
  let rows=await fetch("/api/users").then(r=>r.json());
  if (isThirdAdmin()) rows=rows.filter(u=>u.role==="3rd_Party_Inspector");
  renderTable("tableUsersWrap",["user_id","username","role"],rows);
  renderCards("cardUsersWrap",rows,"user");
}

// ── Table renderer ────────────────────────────────────────────────────────────
const headerMap={extinguisher_id:"ID",assignment_id:"ID",report_id:"ID",user_id:"ID",address:"Address",building_number:"Building",floor_number:"Floor",room_number:"Room",location_description:"Location",inspection_interval_days:"Interval",next_due_date:"Due Date",due_date:"Due Date",assigned_by:"Assigned By",inspector:"Inspector",status:"Status",inspection_date:"Date",notes:"Notes",username:"Username",role:"Role"};

function renderTable(wrapperId,cols,rows,onRowClick) {
  const wrap=document.getElementById(wrapperId);
  if (!rows.length) { wrap.innerHTML=`<p class="empty-msg">[ NO DATA TO DISPLAY ]</p>`; return; }
  let html=`<table class="data-table"><thead><tr>`;
  cols.forEach(c=>html+=`<th>${headerMap[c]||c}</th>`);
  html+=`</tr></thead><tbody>`;
  rows.forEach(row=>{
    const rowId=row.extinguisher_id??row.assignment_id??row.user_id??"";
    html+=`<tr data-id="${rowId}">`;
    cols.forEach(c=>{ let val=row[c]??"—"; if(c==="status") val=statusBadge(val); html+=`<td>${val}</td>`; });
    html+=`</tr>`;
  });
  html+=`</tbody></table>`;
  wrap.innerHTML=html;
  wrap.querySelectorAll("tr[data-id]").forEach(tr=>{
    tr.addEventListener("click",()=>{
      wrap.querySelectorAll("tr").forEach(r=>r.classList.remove("selected"));
      tr.classList.add("selected");
      if(onRowClick) onRowClick(rows.find(r=>String(r.extinguisher_id)===tr.dataset.id||String(r.assignment_id)===tr.dataset.id));
    });
  });
}

// ── Card renderer ─────────────────────────────────────────────────────────────
function renderCards(wrapperId,rows,type,onCardClick) {
  const wrap=document.getElementById(wrapperId);
  if(!rows||!rows.length){ wrap.innerHTML=`<p class="empty-msg">[ NO DATA TO DISPLAY ]</p>`; return; }
  wrap.innerHTML="";
  rows.forEach(row=>{
    const card=document.createElement("div");
    card.className="data-card";
    let primary="",secondary="",badge="",idStr="";
    if(type==="extinguisher"){
      idStr=`EXT-${row.extinguisher_id}`; primary=row.address||"—";
      secondary=[row.building_number&&`Bldg: ${row.building_number}`,row.floor_number&&`Floor: ${row.floor_number}`,row.room_number&&`Room: ${row.room_number}`,row.next_due_date&&`Due: ${row.next_due_date}`].filter(Boolean).join("  ·  ");
    } else if(type==="assignment"){
      idStr=`ASSIGN-${row.assignment_id}`; primary=`Ext #${row.extinguisher_id}`;
      secondary=[row.assigned_by&&`By: ${row.assigned_by}`,row.inspector&&`Inspector: ${row.inspector}`,row.due_date&&`Due: ${row.due_date}`].filter(Boolean).join("  ·  ");
      badge=row.status?statusBadge(row.status):"";
    } else if(type==="report"){
      idStr=`RPT-${row.report_id}`; primary=`Ext #${row.extinguisher_id}`;
      secondary=[row.inspector&&`Inspector: ${row.inspector}`,row.inspection_date&&`Date: ${row.inspection_date}`,row.notes&&`Notes: ${row.notes}`].filter(Boolean).join("  ·  ");
    } else if(type==="user"){
      idStr=`USR-${row.user_id}`; primary=row.username||"—";
      secondary=`Role: ${(row.role||"—").replace(/_/g," ")}`;
    }
    card.innerHTML=`<div class="data-card-id">${idStr}</div><div class="data-card-primary">${primary}</div>${secondary?`<div class="data-card-secondary">${secondary}</div>`:""}${badge?`<div class="data-card-badge">${badge}</div>`:""}`;
    card.addEventListener("click",()=>{ wrap.querySelectorAll(".data-card").forEach(c=>c.classList.remove("selected")); card.classList.add("selected"); if(onCardClick) onCardClick(row); });
    wrap.appendChild(card);
  });
}

function statusBadge(val) {
  const lower=String(val).toLowerCase();
  if(lower.includes("pending")) return `<span class="badge badge-pending">Pending</span>`;
  if(lower.includes("complete")||lower.includes("done")) return `<span class="badge badge-complete">Complete</span>`;
  return `<span class="badge badge-default">${val}</span>`;
}

// ── Refresh / Logout ──────────────────────────────────────────────────────────
document.getElementById("btnRefresh").addEventListener("click",()=>{ loadStats(); loadAllData(); });
document.getElementById("btnLogout").addEventListener("click",()=>{
  currentUser=null; selectedExtId=null;
  document.getElementById("appPage").classList.add("hidden");
  document.getElementById("loginPage").classList.remove("hidden");
  document.getElementById("username").value="";
  document.getElementById("password").value="";
  document.getElementById("loginMsg").textContent="";
  document.getElementById("tabBar").innerHTML="";
  ["extToolbar","assignToolbar","reportToolbar","userToolbar"].forEach(id=>document.getElementById(id).classList.add("hidden"));
});

// ── CRUD: Add Extinguisher ────────────────────────────────────────────────────
document.getElementById("btnAdd").addEventListener("click",()=>{
  editingExtId=null;
  document.getElementById("modalTitle").textContent="Add Extinguisher";
  document.getElementById("modalSave").textContent="Add";
  clearModal();
  const d=new Date(); d.setDate(d.getDate()+30);
  document.getElementById("fDueDate").value=d.toISOString().split("T")[0];
  document.getElementById("extModal").classList.remove("hidden");
});

document.getElementById("btnEdit").addEventListener("click",async()=>{
  if(!selectedExtId){ alert("Select a row first."); return; }
  const rows=await fetch("/api/extinguishers").then(r=>r.json());
  const ext=rows.find(r=>r.extinguisher_id===selectedExtId);
  if(!ext) return;
  editingExtId=selectedExtId;
  document.getElementById("modalTitle").textContent="Edit Extinguisher";
  document.getElementById("modalSave").textContent="Save Changes";
  document.getElementById("fAddress").value=ext.address||"";
  document.getElementById("fBuilding").value=ext.building_number||"";
  document.getElementById("fFloor").value=ext.floor_number||1;
  document.getElementById("fRoom").value=ext.room_number||"";
  document.getElementById("fLocDesc").value=ext.location_description||"";
  document.getElementById("fInterval").value=ext.inspection_interval_days||30;
  document.getElementById("fDueDate").value=ext.next_due_date||"";
  document.getElementById("modalError").textContent="";
  document.getElementById("extModal").classList.remove("hidden");
});

document.getElementById("btnDelete").addEventListener("click",async()=>{
  if(!selectedExtId){ alert("Select a row first."); return; }
  if(!confirm("Delete this extinguisher and all linked assignments/reports?")) return;
  const res=await fetch("/api/extinguishers/"+selectedExtId,{method:"DELETE"});
  if(res.ok){ selectedExtId=null; loadExtinguishers(); loadStats(); }
  else alert("Delete failed: "+(await res.json()).error);
});

document.getElementById("modalCancel").addEventListener("click",()=>document.getElementById("extModal").classList.add("hidden"));
document.getElementById("extModal").addEventListener("click",e=>{ if(e.target===document.getElementById("extModal")) document.getElementById("extModal").classList.add("hidden"); });

document.getElementById("modalSave").addEventListener("click",async()=>{
  const address=document.getElementById("fAddress").value.trim();
  if(!address){ document.getElementById("modalError").textContent="Address is required."; return; }
  const body={address,building_number:document.getElementById("fBuilding").value.trim(),floor_number:parseInt(document.getElementById("fFloor").value)||1,room_number:document.getElementById("fRoom").value.trim(),location_description:document.getElementById("fLocDesc").value.trim(),inspection_interval_days:parseInt(document.getElementById("fInterval").value)||30,next_due_date:document.getElementById("fDueDate").value};
  const url=editingExtId?"/api/extinguishers/"+editingExtId:"/api/extinguishers";
  const method=editingExtId?"PUT":"POST";
  const res=await fetch(url,{method,headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(res.ok){ document.getElementById("extModal").classList.add("hidden"); loadExtinguishers(); loadStats(); }
  else document.getElementById("modalError").textContent="Error: "+(await res.json()).error;
});

function clearModal() {
  ["fAddress","fBuilding","fRoom","fLocDesc","fDueDate"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("fFloor").value=1;
  document.getElementById("fInterval").value=30;
  document.getElementById("modalError").textContent="";
}

// ── Assignment modal helpers ───────────────────────────────────────────────────
async function openAssignModal(editRow=null) {
  editingAssignId = editRow ? editRow.assignment_id : null;

  const exts  = await fetch("/api/extinguishers").then(r=>r.json());
  const users  = await fetch("/api/users").then(r=>r.json());
  const inspectors = users.filter(u=>u.role==="Inspector"||u.role==="3rd_Party_Inspector");

  document.getElementById("aExtinguisher").innerHTML = exts.map(e=>
    `<option value="${e.extinguisher_id}">#${e.extinguisher_id} — ${e.address}, ${e.building_number} Fl.${e.floor_number}</option>`
  ).join("");
  document.getElementById("aInspector").innerHTML = inspectors.map(u=>
    `<option value="${u.user_id}">${u.username} [${u.role}]</option>`
  ).join("");

  if (editRow) {
    // Pre-fill for edit
    document.getElementById("assignModalTitle").textContent = "Edit Assignment";
    document.getElementById("assignModalSave").textContent  = "Save Changes";
    document.getElementById("aStatusRow").style.display     = "";
    // Select matching extinguisher
    [...document.getElementById("aExtinguisher").options].forEach(o=>{
      if(parseInt(o.value)===editRow.extinguisher_id) o.selected=true;
    });
    // Select matching inspector by username — need to match user_id
    // inspectors list has user_id; editRow may have inspector username, so find by id if available
    if (editRow.inspector_id) {
      [...document.getElementById("aInspector").options].forEach(o=>{
        if(parseInt(o.value)===editRow.inspector_id) o.selected=true;
      });
    }
    document.getElementById("aDueDate").value  = editRow.due_date || "";
    document.getElementById("aNotes").value    = editRow.notes    || "";
    document.getElementById("aStatus").value   = editRow.status   || "Pending Inspection";
  } else {
    // Fresh generate
    document.getElementById("assignModalTitle").textContent = "Generate Assignment";
    document.getElementById("assignModalSave").textContent  = "Generate";
    document.getElementById("aStatusRow").style.display     = "none";
    const d = new Date(); d.setDate(d.getDate()+7);
    document.getElementById("aDueDate").value = d.toISOString().split("T")[0];
    document.getElementById("aNotes").value   = "";
  }

  document.getElementById("assignModalError").textContent = "";
  document.getElementById("assignModal").classList.remove("hidden");
}

// ── Generate Assignment button ─────────────────────────────────────────────────
document.getElementById("btnGenerateAssign").addEventListener("click", ()=>openAssignModal(null));

// ── Edit Assignment button ─────────────────────────────────────────────────────
document.getElementById("btnEditAssign").addEventListener("click", async ()=>{
  if (!selectedAssignId) { alert("Select an assignment row first."); return; }
  const rows = window._lastAssignRows || [];
  let row = rows.find(r=>r.assignment_id===selectedAssignId);
  if (!row) {
    // fallback: fetch fresh
    const all = await fetch("/api/assignments").then(r=>r.json());
    row = all.find(r=>r.assignment_id===selectedAssignId);
  }
  if (!row) { alert("Could not load assignment data."); return; }
  // Need inspector_id — fetch from full assignments list
  const full = await fetch("/api/assignments").then(r=>r.json());
  const fullRow = full.find(r=>r.assignment_id===selectedAssignId);
  openAssignModal({...row, inspector_id: fullRow?.inspector_id});
});

document.getElementById("assignModalCancel").addEventListener("click",()=>document.getElementById("assignModal").classList.add("hidden"));
document.getElementById("assignModal").addEventListener("click",e=>{ if(e.target===document.getElementById("assignModal")) document.getElementById("assignModal").classList.add("hidden"); });

document.getElementById("assignModalSave").addEventListener("click",async()=>{
  const extId  = parseInt(document.getElementById("aExtinguisher").value);
  const invId  = parseInt(document.getElementById("aInspector").value);
  const due    = document.getElementById("aDueDate").value;
  const notes  = document.getElementById("aNotes").value.trim();
  const status = document.getElementById("aStatus").value;
  const errEl  = document.getElementById("assignModalError");

  if (!extId||!invId) { errEl.textContent="Please select both fields."; return; }

  if (editingAssignId) {
    // PUT — update existing
    const res = await fetch("/api/assignments/"+editingAssignId, {
      method:"PUT",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({inspector_id:invId, extinguisher_id:extId, due_date:due, notes, status})
    });
    if (res.ok) { document.getElementById("assignModal").classList.add("hidden"); loadAssignments(); loadStats(); }
    else errEl.textContent = "Error: "+(await res.json()).error;
  } else {
    // POST — create new
    const res = await fetch("/api/assignments",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({admin_id:currentUser.user_id, inspector_id:invId, extinguisher_id:extId, due_date:due, notes})
    });
    if (res.ok) { document.getElementById("assignModal").classList.add("hidden"); loadAssignments(); loadStats(); }
    else errEl.textContent = "Error: "+(await res.json()).error;
  }
});

// ── Submit Report (Inspector / ThirdPInv) ─────────────────────────────────────
document.getElementById("btnSubmitReport").addEventListener("click",async()=>{
  const assignments=await fetch("/api/assignments?user_id="+currentUser.user_id).then(r=>r.json());
  const pending=assignments.filter(a=>!String(a.status).toLowerCase().includes("complete"));
  if(!pending.length){ alert("You have no pending assignments to report on."); return; }
  const exts=await fetch("/api/extinguishers").then(r=>r.json());
  const extMap={};
  exts.forEach(e=>extMap[e.extinguisher_id]=e.address+", "+e.building_number);
  document.getElementById("rAssignment").innerHTML=pending.map(a=>`<option value="${a.assignment_id}" data-ext="${a.extinguisher_id}">Assignment #${a.assignment_id} — ${extMap[a.extinguisher_id]||"Ext #"+a.extinguisher_id}</option>`).join("");
  document.getElementById("rDate").value=new Date().toISOString().split("T")[0];
  document.getElementById("rNotes").value="";
  document.getElementById("reportModalError").textContent="";
  document.getElementById("reportModal").classList.remove("hidden");
});

document.getElementById("reportModalCancel").addEventListener("click",()=>document.getElementById("reportModal").classList.add("hidden"));
document.getElementById("reportModal").addEventListener("click",e=>{ if(e.target===document.getElementById("reportModal")) document.getElementById("reportModal").classList.add("hidden"); });

document.getElementById("reportModalSave").addEventListener("click",async()=>{
  const sel=document.getElementById("rAssignment");
  const assignmentId=parseInt(sel.value);
  const extId=parseInt(sel.selectedOptions[0]?.dataset.ext);
  const date=document.getElementById("rDate").value;
  const notes=document.getElementById("rNotes").value.trim();
  if(!assignmentId||!extId){ document.getElementById("reportModalError").textContent="Please select an assignment."; return; }
  const res=await fetch("/api/reports",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({extinguisher_id:extId,inspector_id:currentUser.user_id,inspection_date:date,notes,assignment_id:assignmentId})});
  if(res.ok){ document.getElementById("reportModal").classList.add("hidden"); loadReports(); loadAssignments(); loadStats(); }
  else document.getElementById("reportModalError").textContent="Error: "+(await res.json()).error;
});
// ── Add User (Admin only) ─────────────────────────────────────────────────────
document.getElementById("btnAddUser").addEventListener("click", () => {
  ["uUsername","uPassword","uConfirm"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("uRole").value = "Inspector";
  document.getElementById("userModalError").textContent = "";
  document.getElementById("userModal").classList.remove("hidden");
});

document.getElementById("userModalCancel").addEventListener("click", () => document.getElementById("userModal").classList.add("hidden"));
document.getElementById("userModal").addEventListener("click", e => { if(e.target === document.getElementById("userModal")) document.getElementById("userModal").classList.add("hidden"); });

document.getElementById("userModalSave").addEventListener("click", async () => {
  const username = document.getElementById("uUsername").value.trim();
  const password = document.getElementById("uPassword").value;
  const confirm  = document.getElementById("uConfirm").value;
  const role     = document.getElementById("uRole").value;
  const errEl    = document.getElementById("userModalError");

  if (!username)              { errEl.textContent = "Username is required."; return; }
  if (!password)              { errEl.textContent = "Password is required."; return; }
  if (password !== confirm)   { errEl.textContent = "Passwords do not match."; return; }
  if (password.length < 6)   { errEl.textContent = "Password must be at least 6 characters."; return; }

  const hashed = await sha256(password);

  const res = await fetch("/api/users", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password: hashed, role })
  });

  if (res.ok) {
    document.getElementById("userModal").classList.add("hidden");
    loadUsers(); loadStats();
  } else {
    errEl.textContent = "Error: " + (await res.json()).error;
  }
});
</script>
