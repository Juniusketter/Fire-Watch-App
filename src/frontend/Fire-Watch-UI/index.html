<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FireWatch — NFPA Compliance Tracking</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0d0f12;
      --bg2:       #13161b;
      --bg3:       #1a1e26;
      --border:    #2a2f3a;
      --orange:    #e85d04;
      --orange2:   #f48c06;
      --red:       #c1121f;
      --teal:      #0d9488;
      --green:     #15803d;
      --blue:      #1d4ed8;
      --purple:    #7c3aed;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --muted2:    #9ca3af;
      --white:     #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ══════════════════════════════════════════════════════ LOGIN */
    #loginPage {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .brand-side {
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 3.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Diagonal accent line */
    .brand-side::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 260px; height: 260px;
      border: 2px solid rgba(232, 93, 4, 0.12);
      border-radius: 50%;
    }
    .brand-side::after {
      content: '';
      position: absolute;
      bottom: 60px; right: 40px;
      width: 120px; height: 120px;
      border: 1px solid rgba(232, 93, 4, 0.08);
      border-radius: 50%;
    }

    .brand-icon {
      font-size: 2.8rem;
      margin-bottom: 0.5rem;
      filter: drop-shadow(0 0 20px rgba(232, 93, 4, 0.5));
    }

    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 5rem;
      letter-spacing: 0.08em;
      color: var(--orange);
      line-height: 1;
      text-shadow: 0 0 40px rgba(232, 93, 4, 0.3);
    }

    .brand-sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: var(--muted2);
      margin-top: 0.6rem;
      text-transform: uppercase;
    }

    .brand-divider {
      width: 48px;
      height: 2px;
      background: var(--orange);
      margin: 2rem 0;
    }

    .brand-features {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .brand-features li {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted2);
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .brand-features li::before {
      content: '▸';
      color: var(--orange);
      font-size: 0.65rem;
    }

    /* Login side */
    .login-side {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .login-card {
      width: min(380px, 100%);
    }

    .login-card h2 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .field {
      margin-bottom: 1.25rem;
    }

    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 0.5rem;
    }

    .field input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }

    .field input:focus {
      outline: none;
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(232, 93, 4, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 0.85rem;
      background: var(--orange);
      border: none;
      border-radius: 4px;
      color: white;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-login:hover { background: var(--orange2); }
    .btn-login:active { transform: scale(0.99); }

    #loginMsg {
      margin-top: 0.85rem;
      font-size: 0.8rem;
      font-family: 'IBM Plex Mono', monospace;
      min-height: 1.2rem;
      color: var(--muted2);
    }

    @media (max-width: 720px) {
      #loginPage { grid-template-columns: 1fr; }
      .brand-side { padding: 2rem; min-height: 40vh; }
      .brand-name { font-size: 3.5rem; }
    }

    /* ══════════════════════════════════════════════════════ DASHBOARD */
    .hidden { display: none !important; }

    #appPage {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Topbar */
    .topbar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.65rem 1.5rem;
    }

    .topbar-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.1em;
      color: var(--orange);
      margin-right: auto;
    }

    .topbar-user {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted2);
    }

    .topbar-user strong {
      color: var(--text);
      font-weight: 600;
    }

    .role-pill {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 3px;
      border: 1px solid currentColor;
    }

    .btn-bar {
      padding: 5px 14px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-refresh { background: transparent; color: var(--muted2); }
    .btn-refresh:hover { background: var(--bg3); color: var(--text); }
    .btn-logout { background: transparent; color: var(--red); border-color: var(--red); }
    .btn-logout:hover { background: rgba(193, 18, 31, 0.1); }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }

    .stat-box {
      flex: 1;
      background: var(--bg2);
      padding: 1rem 1.5rem;
      border-top: 3px solid transparent;
      transition: border-color 0.2s;
    }

    .stat-box.color-orange { border-top-color: var(--orange); }
    .stat-box.color-teal   { border-top-color: var(--teal); }
    .stat-box.color-blue   { border-top-color: var(--blue); }
    .stat-box.color-purple { border-top-color: var(--purple); }

    .stat-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .stat-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: 0.04em;
      color: var(--text);
      line-height: 1;
    }

    /* Tab bar */
    .tab-bar {
      display: flex;
      gap: 0;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
    }

    .tab-btn {
      padding: 0.75rem 1.25rem;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); }

    /* Tab panels */
    .tab-panels {
      flex: 1;
      padding: 1.25rem 1.5rem;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    /* Toolbar */
    .table-toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .btn-crud {
      padding: 6px 14px;
      border: 1px solid transparent;
      border-radius: 3px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-crud:hover { opacity: 0.85; }
    .btn-add    { background: var(--green);  color: white; border-color: var(--green); }
    .btn-edit   { background: var(--blue);   color: white; border-color: var(--blue); }
    .btn-delete { background: var(--red);    color: white; border-color: var(--red); }

    /* Data table */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      font-size: 0.82rem;
    }

    .data-table thead th {
      background: var(--bg3);
      color: var(--muted2);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.65rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .data-table tbody td {
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
    }

    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover td { background: var(--bg3); cursor: pointer; }
    .data-table tbody tr.selected td { background: rgba(232, 93, 4, 0.08); }

    /* Status badges */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 2px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .badge-pending  { background: rgba(232, 93, 4, 0.15); color: var(--orange); border: 1px solid rgba(232,93,4,0.3); }
    .badge-complete { background: rgba(13, 148, 136, 0.15); color: var(--teal);  border: 1px solid rgba(13,148,136,0.3); }
    .badge-default  { background: rgba(107, 114, 128, 0.15); color: var(--muted2); border: 1px solid var(--border); }

    .empty-msg {
      text-align: center;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      padding: 3rem;
      letter-spacing: 0.05em;
    }

    /* ══════════════════════════════════════════════════════ MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      backdrop-filter: blur(2px);
    }

    .modal-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-top: 2px solid var(--orange);
      border-radius: 4px;
      padding: 1.75rem;
      width: min(460px, 94vw);
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    }

    .modal-box h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.08em;
      color: var(--orange);
      margin-bottom: 1.25rem;
    }

    .form-row {
      margin-bottom: 1rem;
    }

    .form-row label {
      display: block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 0.4rem;
    }

    .form-row input {
      width: 100%;
      padding: 0.6rem 0.85rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      transition: border-color 0.15s;
    }

    .form-row input:focus {
      outline: none;
      border-color: var(--orange);
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .btn-save {
      padding: 7px 20px;
      background: var(--orange);
      border: none;
      border-radius: 3px;
      color: white;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .btn-save:hover { background: var(--orange2); }

    .btn-cancel {
      padding: 7px 20px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--muted2);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .btn-cancel:hover { border-color: var(--muted2); color: var(--text); }

    .modal-error {
      color: var(--red);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      margin-top: 0.5rem;
      min-height: 1rem;
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════════ LOGIN PAGE -->
<div id="loginPage">
  <section class="brand-side">
    <div class="brand-icon">🔥</div>
    <div class="brand-name">FireWatch</div>
    <div class="brand-sub">NFPA Compliance Tracking System</div>
    <div class="brand-divider"></div>
    <ul class="brand-features">
      <li>LIVE SQLITE DATABASE CONNECTION</li>
      <li>LOCAL-FIRST · OFFLINE CAPABLE</li>
      <li>ROLE-BASED ACCESS CONTROL</li>
    </ul>
  </section>

  <section class="login-side">
    <div class="login-card">
      <h2>System Login</h2>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="username" placeholder="Enter username" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="Enter password" />
      </div>
      <button class="btn-login" id="loginBtn">Login</button>
      <p id="loginMsg"></p>
    </div>
  </section>
</div>

<!-- ══════════════════════════════════════════════════════════════ DASHBOARD -->
<div id="appPage" class="hidden">

  <!-- Topbar -->
  <div class="topbar">
    <span class="topbar-logo">🔥 FireWatch</span>
    <span class="topbar-user">
      <strong id="welcomeLabel"></strong>
    </span>
    <span class="role-pill" id="roleLabel"></span>
    <button class="btn-bar btn-refresh" id="btnRefresh">↻ Refresh</button>
    <button class="btn-bar btn-logout" id="btnLogout">Logout</button>
  </div>

  <!-- Stats row -->
  <div class="stats-row" id="statsRow">
    <div class="stat-box color-orange" id="statBoxExt">
      <div class="stat-label" id="statLabelExt">Extinguishers</div>
      <div class="stat-val" id="statExt">—</div>
    </div>
    <div class="stat-box color-teal" id="statBoxAssign">
      <div class="stat-label" id="statLabelAssign">Assignments</div>
      <div class="stat-val" id="statAssign">—</div>
    </div>
    <div class="stat-box color-blue" id="statBoxReports">
      <div class="stat-label" id="statLabelReports">Reports</div>
      <div class="stat-val" id="statReports">—</div>
    </div>
    <div class="stat-box color-purple" id="statBoxUsers">
      <div class="stat-label" id="statLabelUsers">Users</div>
      <div class="stat-val" id="statUsers">—</div>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar" id="tabBar"></div>

  <!-- Tab panels -->
  <div class="tab-panels">

    <div class="panel" id="panelExtinguishers">
      <div class="table-toolbar hidden" id="extToolbar">
        <button class="btn-crud btn-add"    id="btnAdd">＋ Add Extinguisher</button>
        <button class="btn-crud btn-edit"   id="btnEdit">✎ Edit Selected</button>
        <button class="btn-crud btn-delete" id="btnDelete">✕ Delete Selected</button>
      </div>
      <div id="tableExtWrap"></div>
    </div>

    <div class="panel" id="panelAssignments">
      <div id="tableAssignWrap"></div>
    </div>

    <div class="panel" id="panelReports">
      <div id="tableReportsWrap"></div>
    </div>

    <div class="panel" id="panelUsers">
      <div id="tableUsersWrap"></div>
    </div>

  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════ ADD/EDIT MODAL -->
<div class="modal-overlay hidden" id="extModal">
  <div class="modal-box">
    <h3 id="modalTitle">Add Extinguisher</h3>
    <div class="form-row">
      <label>Address *</label>
      <input type="text" id="fAddress" placeholder="e.g. 123 University Avenue" />
    </div>
    <div class="form-row">
      <label>Building</label>
      <input type="text" id="fBuilding" placeholder="e.g. Bldg A" />
    </div>
    <div class="form-row">
      <label>Floor</label>
      <input type="number" id="fFloor" value="1" min="0" />
    </div>
    <div class="form-row">
      <label>Room</label>
      <input type="text" id="fRoom" placeholder="e.g. 101" />
    </div>
    <div class="form-row">
      <label>Location Description</label>
      <input type="text" id="fLocDesc" placeholder="e.g. Near the elevator" />
    </div>
    <div class="form-row">
      <label>Inspection Interval (days)</label>
      <input type="number" id="fInterval" value="30" min="1" />
    </div>
    <div class="form-row">
      <label>Next Due Date</label>
      <input type="date" id="fDueDate" />
    </div>
    <div class="modal-error" id="modalError"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modalCancel">Cancel</button>
      <button class="btn-save"   id="modalSave">Save</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
let currentUser  = null;
let selectedExtId = null;
let editingExtId  = null;

// ── Role helpers ───────────────────────────────────────────────────────────────
const isAdmin      = () => currentUser?.role === "Admin";
const isInv        = () => currentUser?.role === "Inspector";
const isThirdAdmin = () => currentUser?.role === "3rd_Party_Admin";
const isThirdInv   = () => currentUser?.role === "3rd_Party_Inspector";

// ── Login ──────────────────────────────────────────────────────────────────────
document.getElementById("loginBtn").addEventListener("click", doLogin);
document.getElementById("password").addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});

async function doLogin() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const msg      = document.getElementById("loginMsg");

  if (!username || !password) {
    msg.style.color = "#e85d04"; msg.textContent = "Please enter both fields."; return;
  }
  msg.style.color = "#6b7280"; msg.textContent = "Authenticating...";

  try {
    const res  = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.success) {
      currentUser = { user_id: data.user_id, username: data.username, role: data.role };
      showDashboard();
    } else {
      msg.style.color = "#c1121f"; msg.textContent = "Invalid username or password.";
    }
  } catch {
    msg.style.color = "#c1121f"; msg.textContent = "Cannot reach server.";
  }
}

// ── Dashboard setup ───────────────────────────────────────────────────────────
function showDashboard() {
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("appPage").classList.remove("hidden");

  // Welcome label
  const welcome = document.getElementById("welcomeLabel");
  welcome.textContent = currentUser.username + " · " + currentUser.role.toUpperCase();

  // Role pill color
  const rl = document.getElementById("roleLabel");
  rl.textContent = currentUser.role.replace(/_/g, " ");
  const roleColors = {
    "Admin":               { color: "#e85d04", border: "rgba(232,93,4,0.4)" },
    "Inspector":           { color: "#0d9488", border: "rgba(13,148,136,0.4)" },
    "3rd_Party_Admin":     { color: "#1d4ed8", border: "rgba(29,78,216,0.4)" },
    "3rd_Party_Inspector": { color: "#7c3aed", border: "rgba(124,58,237,0.4)" }
  };
  const rc = roleColors[currentUser.role] || { color: "#9ca3af", border: "rgba(156,163,175,0.4)" };
  rl.style.color       = rc.color;
  rl.style.borderColor = rc.border;

  buildTabs();
  loadStats();
  loadAllData();
}

// ── Build tabs by role ────────────────────────────────────────────────────────
function buildTabs() {
  const tabBar = document.getElementById("tabBar");
  tabBar.innerHTML = "";

  ["panelExtinguishers","panelAssignments","panelReports","panelUsers"]
    .forEach(id => document.getElementById(id).classList.remove("active"));

  // Reset stat boxes
  ["statBoxExt","statBoxAssign","statBoxReports","statBoxUsers"]
    .forEach(id => document.getElementById(id).style.display = "");

  let tabs = [];

  if (isAdmin()) {
    tabs = [
      { id: "panelExtinguishers", label: "Extinguishers" },
      { id: "panelAssignments",   label: "Assignments"   },
      { id: "panelReports",       label: "Reports"       },
      { id: "panelUsers",         label: "All Users"     },
    ];
    document.getElementById("extToolbar").classList.remove("hidden");
  }
  else if (isInv()) {
    tabs = [
      { id: "panelAssignments", label: "My Assignments" },
      { id: "panelReports",     label: "My Reports"     },
    ];
    document.getElementById("statBoxExt").style.display   = "none";
    document.getElementById("statBoxUsers").style.display = "none";
    document.getElementById("statLabelAssign").textContent  = "My Assignments";
    document.getElementById("statLabelReports").textContent = "My Reports";
  }
  else if (isThirdAdmin()) {
    tabs = [
      { id: "panelAssignments", label: "Assignments" },
      { id: "panelUsers",       label: "My Team"     },
    ];
    document.getElementById("statBoxExt").style.display     = "none";
    document.getElementById("statBoxReports").style.display = "none";
    document.getElementById("statLabelUsers").textContent   = "Team Members";
  }
  else if (isThirdInv()) {
    tabs = [
      { id: "panelAssignments", label: "My Assignments" },
    ];
    ["statBoxExt","statBoxReports","statBoxUsers"]
      .forEach(id => document.getElementById(id).style.display = "none");
    document.getElementById("statLabelAssign").textContent = "My Assignments";
  }

  tabs.forEach((t, i) => {
    const btn = document.createElement("button");
    btn.className = "tab-btn" + (i === 0 ? " active" : "");
    btn.textContent = t.label;
    btn.addEventListener("click", () => switchTab(t.id, btn, tabBar));
    tabBar.appendChild(btn);
    if (i === 0) document.getElementById(t.id).classList.add("active");
  });
}

function switchTab(panelId, clickedBtn, tabBar) {
  tabBar.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  clickedBtn.classList.add("active");
  ["panelExtinguishers","panelAssignments","panelReports","panelUsers"]
    .forEach(id => document.getElementById(id).classList.remove("active"));
  document.getElementById(panelId).classList.add("active");
}

// ── Stats ─────────────────────────────────────────────────────────────────────
async function loadStats() {
  try {
    const res  = await fetch("/api/stats");
    const data = await res.json();

    if (isAdmin()) {
      document.getElementById("statExt").textContent     = data.extinguishers;
      document.getElementById("statAssign").textContent  = data.assignments;
      document.getElementById("statReports").textContent = data.reports;
      document.getElementById("statUsers").textContent   = data.users;
    } else if (isInv()) {
      const [a, r] = await Promise.all([
        fetch("/api/assignments?user_id=" + currentUser.user_id).then(r=>r.json()),
        fetch("/api/reports?user_id="     + currentUser.user_id).then(r=>r.json())
      ]);
      document.getElementById("statAssign").textContent  = a.length;
      document.getElementById("statReports").textContent = r.length;
    } else if (isThirdAdmin()) {
      document.getElementById("statAssign").textContent = data.assignments;
      const users = await fetch("/api/users").then(r=>r.json());
      document.getElementById("statUsers").textContent =
        users.filter(u => u.role === "3rd_Party_Inspector").length;
    } else if (isThirdInv()) {
      const a = await fetch("/api/assignments?user_id=" + currentUser.user_id).then(r=>r.json());
      document.getElementById("statAssign").textContent = a.length;
    }
  } catch(e) { console.error("Stats error", e); }
}

// ── Load data ─────────────────────────────────────────────────────────────────
function loadAllData() {
  if (isAdmin())           { loadExtinguishers(); loadAssignments(); loadReports(); loadUsers(); }
  else if (isInv())        { loadAssignments(); loadReports(); }
  else if (isThirdAdmin()) { loadAssignments(); loadUsers(); }
  else if (isThirdInv())   { loadAssignments(); }
}

async function loadExtinguishers() {
  const rows = await fetch("/api/extinguishers").then(r=>r.json());
  const cols = ["extinguisher_id","address","building_number","floor_number",
                "room_number","location_description","inspection_interval_days","next_due_date"];
  renderTable("tableExtWrap", cols, rows, row => { selectedExtId = row.extinguisher_id; });
}

async function loadAssignments() {
  let url = "/api/assignments";
  if (isInv() || isThirdInv()) url += "?user_id=" + currentUser.user_id;
  const rows = await fetch(url).then(r=>r.json());
  const cols = (isAdmin() || isThirdAdmin())
    ? ["assignment_id","assigned_by","inspector","extinguisher_id","status"]
    : ["assignment_id","assigned_by","extinguisher_id","status"];
  renderTable("tableAssignWrap", cols, rows);
}

async function loadReports() {
  let url = "/api/reports";
  if (isInv()) url += "?user_id=" + currentUser.user_id;
  const rows = await fetch(url).then(r=>r.json());
  const cols = isAdmin()
    ? ["report_id","extinguisher_id","inspector","inspection_date","notes"]
    : ["report_id","extinguisher_id","inspection_date","notes"];
  renderTable("tableReportsWrap", cols, rows);
}

async function loadUsers() {
  let rows = await fetch("/api/users").then(r=>r.json());
  if (isThirdAdmin()) rows = rows.filter(u => u.role === "3rd_Party_Inspector");
  renderTable("tableUsersWrap", ["user_id","username","role"], rows);
}

// ── Table renderer ────────────────────────────────────────────────────────────
function renderTable(wrapperId, cols, rows, onRowClick) {
  const wrap = document.getElementById(wrapperId);
  if (!rows.length) {
    wrap.innerHTML = `<p class="empty-msg">[ NO DATA TO DISPLAY ]</p>`;
    return;
  }

  // Friendly column headers
  const headerMap = {
    extinguisher_id: "ID", assignment_id: "ID", report_id: "ID", user_id: "ID",
    address: "Address", building_number: "Building", floor_number: "Floor",
    room_number: "Room", location_description: "Location", inspection_interval_days: "Interval",
    next_due_date: "Due Date", assigned_by: "Assigned By", inspector: "Inspector",
    status: "Status", inspection_date: "Date", notes: "Notes",
    username: "Username", role: "Role"
  };

  let html = `<table class="data-table"><thead><tr>`;
  cols.forEach(c => html += `<th>${headerMap[c] || c}</th>`);
  html += `</tr></thead><tbody>`;

  rows.forEach(row => {
    const rowId = row.extinguisher_id ?? row.assignment_id ?? row.user_id ?? "";
    html += `<tr data-id="${rowId}">`;
    cols.forEach(c => {
      let val = row[c] ?? "—";
      // Style status badges
      if (c === "status") {
        const lower = String(val).toLowerCase();
        if (lower.includes("pending"))  val = `<span class="badge badge-pending">Pending Inspection</span>`;
        else if (lower.includes("complete") || lower.includes("done"))
          val = `<span class="badge badge-complete">Inspection Complete</span>`;
        else val = `<span class="badge badge-default">${val}</span>`;
      }
      html += `<td>${val}</td>`;
    });
    html += `</tr>`;
  });

  html += `</tbody></table>`;
  wrap.innerHTML = html;

  wrap.querySelectorAll("tr[data-id]").forEach(tr => {
    tr.addEventListener("click", () => {
      wrap.querySelectorAll("tr").forEach(r => r.classList.remove("selected"));
      tr.classList.add("selected");
      if (onRowClick) onRowClick(rows.find(r =>
        String(r.extinguisher_id) === tr.dataset.id ||
        String(r.assignment_id)   === tr.dataset.id
      ));
    });
  });
}

// ── Refresh / Logout ──────────────────────────────────────────────────────────
document.getElementById("btnRefresh").addEventListener("click", () => { loadStats(); loadAllData(); });

document.getElementById("btnLogout").addEventListener("click", () => {
  currentUser = null; selectedExtId = null;
  document.getElementById("appPage").classList.add("hidden");
  document.getElementById("loginPage").classList.remove("hidden");
  document.getElementById("username").value = "";
  document.getElementById("password").value = "";
  document.getElementById("loginMsg").textContent = "";
  document.getElementById("tabBar").innerHTML = "";
  document.getElementById("extToolbar").classList.add("hidden");
});

// ── CRUD: Add ─────────────────────────────────────────────────────────────────
document.getElementById("btnAdd").addEventListener("click", () => {
  editingExtId = null;
  document.getElementById("modalTitle").textContent = "Add Extinguisher";
  document.getElementById("modalSave").textContent  = "Add";
  clearModal();
  const d = new Date(); d.setDate(d.getDate() + 30);
  document.getElementById("fDueDate").value = d.toISOString().split("T")[0];
  document.getElementById("extModal").classList.remove("hidden");
});

// ── CRUD: Edit ────────────────────────────────────────────────────────────────
document.getElementById("btnEdit").addEventListener("click", async () => {
  if (!selectedExtId) { alert("Select a row first."); return; }
  const rows = await fetch("/api/extinguishers").then(r=>r.json());
  const ext  = rows.find(r => r.extinguisher_id === selectedExtId);
  if (!ext) return;

  editingExtId = selectedExtId;
  document.getElementById("modalTitle").textContent = "Edit Extinguisher";
  document.getElementById("modalSave").textContent  = "Save Changes";
  document.getElementById("fAddress").value  = ext.address || "";
  document.getElementById("fBuilding").value = ext.building_number || "";
  document.getElementById("fFloor").value    = ext.floor_number || 1;
  document.getElementById("fRoom").value     = ext.room_number || "";
  document.getElementById("fLocDesc").value  = ext.location_description || "";
  document.getElementById("fInterval").value = ext.inspection_interval_days || 30;
  document.getElementById("fDueDate").value  = ext.next_due_date || "";
  document.getElementById("modalError").textContent = "";
  document.getElementById("extModal").classList.remove("hidden");
});

// ── CRUD: Delete ──────────────────────────────────────────────────────────────
document.getElementById("btnDelete").addEventListener("click", async () => {
  if (!selectedExtId) { alert("Select a row first."); return; }
  if (!confirm("Delete this extinguisher and all linked assignments/reports?")) return;

  const res = await fetch("/api/extinguishers/" + selectedExtId, { method: "DELETE" });
  if (res.ok) {
    selectedExtId = null;
    loadExtinguishers(); loadStats();
  } else {
    alert("Delete failed: " + (await res.json()).error);
  }
});

// ── Modal: Cancel / Save ──────────────────────────────────────────────────────
document.getElementById("modalCancel").addEventListener("click", () => {
  document.getElementById("extModal").classList.add("hidden");
});

document.getElementById("modalSave").addEventListener("click", async () => {
  const address = document.getElementById("fAddress").value.trim();
  if (!address) {
    document.getElementById("modalError").textContent = "Address is required."; return;
  }

  const body = {
    address,
    building_number:          document.getElementById("fBuilding").value.trim(),
    floor_number:       parseInt(document.getElementById("fFloor").value) || 1,
    room_number:              document.getElementById("fRoom").value.trim(),
    location_description:     document.getElementById("fLocDesc").value.trim(),
    inspection_interval_days: parseInt(document.getElementById("fInterval").value) || 30,
    next_due_date:            document.getElementById("fDueDate").value,
  };

  const url    = editingExtId ? "/api/extinguishers/" + editingExtId : "/api/extinguishers";
  const method = editingExtId ? "PUT" : "POST";

  const res = await fetch(url, {
    method,
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  if (res.ok) {
    document.getElementById("extModal").classList.add("hidden");
    loadExtinguishers(); loadStats();
  } else {
    document.getElementById("modalError").textContent =
      "Error: " + (await res.json()).error;
  }
});

function clearModal() {
  ["fAddress","fBuilding","fRoom","fLocDesc","fDueDate"].forEach(id =>
    document.getElementById(id).value = "");
  document.getElementById("fFloor").value    = 1;
  document.getElementById("fInterval").value = 30;
  document.getElementById("modalError").textContent = "";
}
</script>
</body>
