<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FireWatch Login</title>
</head>
<body>
  <main class="page" id="loginPage">
    <section class="brand-side" aria-label="Brand area">
      <h1 class="brand">FireWatch</h1>
    </section>

    <section class="login-side" aria-label="Login area">
      <form class="login-card" id="loginForm">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required />
        </div>

        <button type="submit">Login</button>
        <p class="message" id="message" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script>
    function applyFallbackStyles() {
      const fallback = document.createElement("style");
      fallback.textContent = `
        body { background: #e9dec8; color: #000; }
        button { background: #3fa34d; color: #000; }
        button:hover { background: #2e8c3b; }
      `;
      document.head.appendChild(fallback);
    }

    async function loadStylesFromJson() {
      try {
        const response = await fetch("./styles.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Failed to load styles.json");
        }

        const payload = await response.json();
        if (!payload || typeof payload.css !== "string") {
          throw new Error("Invalid styles.json format");
        }

        const styleTag = document.createElement("style");
        styleTag.textContent = payload.css;
        document.head.appendChild(styleTag);
      } catch (error) {
        console.error("Style loading error:", error);
        applyFallbackStyles();
      }
    }

    const form = document.getElementById("loginForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      message.textContent = "Checking login...";
      message.style.color = "#1f1f1f";

      try {
        // Front-end call to backend login endpoint.
        // Backend/database should verify credentials and return a JSON response.
        const response = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });

        if (!response.ok) {
          throw new Error("Login failed");
        }

        const data = await response.json();
        if (data && data.success) {
          window.location.href = "./dashboard.html";
        } else {
          message.textContent = "Invalid username or password.";
          message.style.color = "var(--danger)";
        }
      } catch (error) {
        message.textContent = "Unable to reach backend login service.";
        message.style.color = "var(--danger)";
      }
    });

    loadStylesFromJson();
  </script>
</body>
</html>
