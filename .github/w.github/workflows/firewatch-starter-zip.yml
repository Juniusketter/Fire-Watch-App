name: Firewatch Repository Starter (ZIP)
on:
  workflow_dispatch:
jobs:
  build-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Firewatch scaffold
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p firewatch/{schema,docs,.github/workflows,auth_cpp_sqlite/{src,include,tests}}

          ###############################################################################
          # README.md
          ###############################################################################
          cat > firewatch/README.md <<'EOF'
# Firewatch

Local‑first inspection workflow for extinguishers and related assets.

## Features
- Auth & Roles: Admin, Inspector, ThirdPartyAdmin, ThirdPartyInspector
- Assignments & Items
- Reports & Photos (object storage)
- Auditability
- Local‑first with offline queue and retry

## 🔐 Auth Service (C++ + SQLite)

This repo includes **`auth_cpp_sqlite/`** — a self-contained C++ auth module with:
- JWT (HS256) short‑TTL tokens
- Login/Logout endpoints (optional HTTP via header-only cpp-httplib + nlohmann/json)
- SQLite repository for users, token revocation (jti blacklist), and audit events
- CLI for quick testing

### Build & Run

**Prereqs**
- CMake ≥ 3.16, C++17 compiler
- SQLite dev headers (libsqlite3-dev) and OpenSSL dev (libssl-dev)
- (HTTP optional) Place `httplib.h` and `json.hpp` in `auth_cpp_sqlite/include/`

```bash
cd auth_cpp_sqlite
mkdir -p include   # put httplib.h and json.hpp here if you will run HTTP
cd ..
mkdir -p build && cd build
cmake -DBUILD_HTTP=ON ..
cmake --build . -j
./auth_server   # HTTP API on :4000
# or
./auth_cli      # interactive CLI (login/me/logout)
