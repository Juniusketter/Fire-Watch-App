name: Local‑First Inspection Workflow CI

on:
  push:
    branches: [ "main", "release/*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  # -------------------------------
  # 1) Static checks + schema lint
  # -------------------------------
  static-checks:
    name: Static Checks & Schemas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SQLite
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 libsqlite3-dev

      - name: Validate DB schema.sql (if present)
        if: ${{ hashFiles('db/schema.sql') != '' }}
        run: |
          sqlite3 :memory: < db/schema.sql
          echo "SQL schema valid ✔"

      - name: Validate JSON Schemas (Assignment/Report) if present
        run: |
          npm i -g ajv-cli ajv-formats
          if [ -f schemas/assignment.schema.json ] && [ -f examples/assignment.example.json ]; then
            ajv validate -s schemas/assignment.schema.json -d examples/assignment.example.json
          else
            echo "Assignment schema/example missing, skipping"
          fi
          if [ -f schemas/report.schema.json ] && [ -f examples/report.example.json ]; then
            ajv validate -s schemas/report.schema.json -d examples/report.example.json
          else
            echo "Report schema/example missing, skipping"
          fi

      - name: Assert ERD assets exist (docs/erd)
        run: |
          test -f docs/erd/erd-4k.png
          test -f docs/erd/README.md
          echo "ERD assets present ✔"

  # -------------------------------
  # 2) Build + run 8-test harness
  # -------------------------------
  build-test:
    name: Build & Unit Tests (CMake)
    needs: [static-checks]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SQLite (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 libsqlite3-dev

      - name: Install SQLite (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install sqlite

      # Windows: use vcpkg for sqlite3 (respects vcpkg.json at repo root)
      - name: Setup vcpkg (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-vcpkg@v1
        with:
          vcpkg-triplet: x64-windows
          runVcpkgInstall: true

      - name: Configure (CMake)
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release ^
              -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}\scripts\buildsystems\vcpkg.cmake" ^
              -DVCPKG_TARGET_TRIPLET=x64-windows
          else
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          fi

      - name: Build (CMake)
        run: cmake --build build --config Release --parallel

      - name: Run tests (8-test harness)
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./build/Release/firewatch_tests.exe
          else
            ./build/firewatch_tests
          fi

  # -------------------------------------------------------
  # 3) Local-first simulations: queue + P2P (optional files)
  # -------------------------------------------------------
  local-first-sim:
    name: Local‑First Simulations (Offline Queue & P2P)
    needs: [build-test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SQLite
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 libsqlite3-dev

      - name: Compile local queue simulation (if present)
        if: ${{ hashFiles('tests/local_queue_sim.cpp') != '' }}
        run: |
          g++ tests/local_queue_sim.cpp -std=c++17 -lsqlite3 -o queue_sim
          ./queue_sim

      - name: Compile P2P simulation (if present)
        if: ${{ hashFiles('tests/p2p_sync_sim.cpp') != '' }}
        run: |
          g++ tests/p2p_sync_sim.cpp -std=c++17 -lsqlite3 -o p2p_sim
          ./p2p_sim

  # -------------------------------
  # 4) Publish artifacts (optional)
  # -------------------------------
  artifacts:
    name: Publish Diagrams & Binaries
    needs: [local-first-sim]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload ERD & docs
        uses: actions/upload-artifact@v4
        with:
          name: erd-and-docs
          path: |
            docs/erd/erd-4k.png
            docs/erd/README.md

      - name: Upload test binary (Linux)
        if: ${{ runner.os == 'Linux' }}
        uses: actions/upload-artifact@v4
        with:
          name: firewatch-tests-linux
          path: build/firewatch_tests
          if-no-files-found: warn
